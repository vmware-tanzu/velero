name: Pull Request CI Check
on: [pull_request]
jobs:
  build:
    name: Run CI
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - name: Check out the code
        uses: actions/checkout@v5

      - name: Extract Go version from go.mod if target branch is main
        id: main-go-version
        if: github.event.pull_request.base.ref == 'main'
        run: |
          # Extract the version (e.g. 1.24.0, or 1.24)
          originVersion=$(grep '^go ' go.mod | awk '{print $2}')

          # Only keep the major and minor version (1.24)
          version=$(echo "$originVersion" | cut -d. -f1-2)

          echo "version=$version"
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Set up Go for main branch
        if: github.event.pull_request.base.ref == 'main'
        uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.main-go-version.outputs.version }}

      - name: Set up Go for released branches
        if: github.event.pull_request.base.ref != 'main'
        uses: actions/setup-go@v5
        with: 
            go-version-file: go.mod

      # Display the setup Go version
      - run: go version

      - name: Make ci
        run: make ci
      - name: Upload test coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.out
          verbose: true
          fail_ci_if_error: true
