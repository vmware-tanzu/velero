name: Pull Request Linter Check
on: [pull_request]
jobs:

  build:
    name: Run Linter Check
    runs-on: ubuntu-latest
    steps:

    - name: Check out the code
      uses: actions/checkout@v3

    - uses: actions/setup-go@v4
      with:
        go-version: '1.21'
        cache: false

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v3
      with:
        version: v1.57.1
        skip-pkg-cache: true
