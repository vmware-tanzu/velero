name: Main CI

on:
  push:
    branches:
      - 'main'
      - 'release-**'
    tags:
      - '*'

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v5

      - name: Extract Go version from go.mod if target branch is main
        id: main-go-version
        if: github.ref == 'refs/heads/main'
        run: |
          # Extract the version (e.g. 1.24.0, or 1.24)
          originVersion=$(grep '^go ' go.mod | awk '{print $2}')

          # Only keep the major and minor version (1.24)
          version=$(echo "$originVersion" | cut -d. -f1-2)

          echo "version=$version"
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Set up Go for main branch
        if: github.ref == 'refs/heads/main'
        uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.main-go-version.outputs.version }}

      - name: Set up Go for released branches
        if: github.ref != 'refs/heads/main'
        uses: actions/setup-go@v5
        with: 
            go-version-file: go.mod

      # Display the setup Go version
      - run: go version

      - name: Set up QEMU
        id: qemu
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: latest
      - name: Build
        run: |
          make local
          # Clean go cache to ease the build environment storage pressure.
          go clean -modcache -cache
      - name: Test
        run: make test
      - name: Upload test coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.out
          verbose: true
      # Only try to publish the container image from the root repo; forks don't have permission to do so and will always get failures.
      - name: Publish container image
        if: github.repository == 'vmware-tanzu/velero'
        run: |
          sudo swapoff -a
          sudo rm -f /mnt/swapfile
          docker system prune -a --force
              
          # Build and push Velero image to docker registry
          docker login -u ${{ secrets.DOCKER_USER }} -p ${{ secrets.DOCKER_PASSWORD }}
          ./hack/docker-push.sh
